name: CKAN

on:
  push:
    paths:
      - 'dataset/**'
      - 'upload/**'

  workflow_dispatch:

jobs:
  publish_update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.23.5 --no-cache-dir
          pip install -r requirements.txt

      - name: Convert CSV
        run: task csv

      - name: Create datapackage.yaml
        env:
          DATASET_NAME: ${{ github.event.repository.name }}
          OWNER_ORG: ${{ secrets.OWNER_ORG }}
        run: task yaml

      - name: Create datapackage.json
        run: task json

      # - name: Create dynamic documentation
      #   run: task documentation

      - name: Local dataset validation
        run: task validate

      - name: Create Report
        continue-on-error: true
        run: task report

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Atualiza arquivos gerados automaticamente

      - id: string
        uses: ASzc/change-string-case-action@v1
        with:
          string: ${{ github.actor }}

      - name: Create dataset in CKAN with not exist
        continue-on-error: true
        env:
          CKAN_HOST: ${{ secrets.CKAN_HOST }}
          CKAN_KEY: ${{ secrets[format('CKAN_KEY_{0}', steps.string.outputs.uppercase)] }}
        run: |
          dpckan \
            --datastore \
            --datapackage dataset/datapackage.json \
            --ckan-host "$CKAN_HOST" \
            --ckan-key "$CKAN_KEY" \
            dataset create

      - name: Update dataset in CKAN with dpckan with exist
        if: ${{ ! cancelled() }}
        env:
          CKAN_HOST: ${{ secrets.CKAN_HOST }}
          CKAN_KEY: ${{ secrets[format('CKAN_KEY_{0}', steps.string.outputs.uppercase)] }}
        run: |
          dpckan \
            --datastore \
            --datapackage dataset/datapackage.json \
            --ckan-host "$CKAN_HOST" \
            --ckan-key "$CKAN_KEY" \
            dataset update
